name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features
      - name: Test
        run: cargo test --all
      - name: Test (cluster feature — raft-backed ledger)
        run: cargo test -p tokenfuse-gateway --features cluster --test cluster_backend

  python-sdk:
    name: python sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install pytest
      - name: Test
        working-directory: sdk/python
        run: python -m pytest -q

  js-sdk:
    name: js sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Test
        working-directory: sdk/js
        run: node test.js

  openapi:
    name: openapi spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate spec
        run: cargo run -q -p tokenfuse-cloud -- --openapi > openapi.json
      - name: Validate spec
        run: |
          pip install openapi-spec-validator
          openapi-spec-validator openapi.json
      - name: Upload spec artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: openapi.json

  # The Cloud control plane is now a Rust workspace member (crates/cloud); it is
  # built, clippy-checked and tested by the `fmt · clippy · test` job above. The
  # former Go `cloud` job was removed in the Go→Rust port (ADR-7, PR A5).

  dashboard:
    name: dashboard (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloud/dashboard/package-lock.json
      - name: Install
        working-directory: cloud/dashboard
        run: npm ci --no-audit --no-fund
      - name: Build (static export)
        working-directory: cloud/dashboard
        run: npm run build

  cluster:
    name: cluster (raft HA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/cluster
      - name: Format check
        working-directory: crates/cluster
        run: cargo fmt --all -- --check
      - name: Clippy
        working-directory: crates/cluster
        run: cargo clippy --all-targets
      - name: Test
        working-directory: crates/cluster
        run: cargo test

  security:
    name: security (cargo audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit workspace
        run: cargo audit
      - name: Audit cluster crate
        working-directory: crates/cluster
        run: cargo audit

  radar:
    name: radar (eBPF build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: System deps
        run: sudo apt-get update && sudo apt-get install -y clang llvm libelf-dev
      - name: Install Rust (stable + nightly + rust-src)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - run: rustup toolchain install stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/radar
      - name: Install bpf-linker
        run: cargo install bpf-linker
      - name: Build radar
        working-directory: crates/radar
        run: cargo build

  apns:
    name: cloud apns (feature build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build + clippy the real APNs sender
        run: cargo clippy -p tokenfuse-cloud --all-targets --features apns -- -D warnings

  ios:
    name: ios (build + test)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        working-directory: mobile/ios
        run: xcodegen generate
      - name: Build (simulator · no signing)
        working-directory: mobile/ios
        run: |
          xcodebuild build \
            -project TokenFuse.xcodeproj \
            -scheme TokenFuse \
            -destination 'generic/platform=iOS Simulator' \
            -quiet \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
      - name: Test (on an available simulator)
        working-directory: mobile/ios
        run: |
          SIM=$(xcrun simctl list devices available | grep -m1 -oE 'iPhone [0-9]+( Pro)?' || echo 'iPhone 16')
          echo "Testing on: $SIM"
          xcodebuild test \
            -project TokenFuse.xcodeproj \
            -scheme TokenFuse \
            -destination "platform=iOS Simulator,name=$SIM" \
            -quiet \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
