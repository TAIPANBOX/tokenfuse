name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features
      - name: Test
        run: cargo test --all
      - name: Test (cluster feature — raft-backed ledger)
        run: cargo test -p tokenfuse-gateway --features cluster --test cluster_backend

  python-sdk:
    name: python sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install pytest
      - name: Test
        working-directory: sdk/python
        run: python -m pytest -q

  cloud:
    name: cloud (control plane · Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: gofmt
        working-directory: cloud/control-plane
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
      - name: vet
        working-directory: cloud/control-plane
        run: go vet ./...
      - name: test
        working-directory: cloud/control-plane
        run: go test ./...

  cluster:
    name: cluster (raft HA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/cluster
      - name: Format check
        working-directory: crates/cluster
        run: cargo fmt --all -- --check
      - name: Clippy
        working-directory: crates/cluster
        run: cargo clippy --all-targets
      - name: Test
        working-directory: crates/cluster
        run: cargo test

  radar:
    name: radar (eBPF build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: System deps
        run: sudo apt-get update && sudo apt-get install -y clang llvm libelf-dev
      - name: Install Rust (stable + nightly + rust-src)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - run: rustup toolchain install stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/radar
      - name: Install bpf-linker
        run: cargo install bpf-linker
      - name: Build radar
        working-directory: crates/radar
        run: cargo build
