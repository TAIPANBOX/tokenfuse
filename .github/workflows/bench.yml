name: bench

# Reproduce the networked latency benchmark in GitHub Actions (manual trigger) —
# so the numbers can be regenerated in the cloud, without any personal server.
# Runner numbers are noisier than a dedicated box; the delta is what matters.
on:
  workflow_dispatch:

jobs:
  networked:
    name: networked latency (wrk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install wrk
        run: sudo apt-get update && sudo apt-get install -y wrk
      - name: Run benchmark
        run: bash bench/run.sh | tee bench-result.txt
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: bench-result
          path: bench-result.txt
