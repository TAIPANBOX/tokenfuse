# XcodeGen project spec — the .xcodeproj is generated, not committed, so it
# stays reviewable as YAML (see docs/14-mobile-companion.md, ADR 14.6).
#   brew install xcodegen && cd mobile/ios && xcodegen generate
name: TokenFusePocket
options:
  bundleIdPrefix: com.taipanbox.tokenfuse
  deploymentTarget:
    iOS: "17.2"
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.40.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # No signing — simulator builds only until an Apple Developer account exists.
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO
targets:
  TokenFusePocket:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taipanbox.tokenfuse.pocket
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
