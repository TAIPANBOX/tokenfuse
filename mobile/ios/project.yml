# XcodeGen project spec — the .xcodeproj is generated, not committed, so it
# stays reviewable as YAML (see docs/14-mobile-companion.md, ADR 14.6).
#   brew install xcodegen && cd mobile/ios && xcodegen generate
name: TokenFuse
options:
  bundleIdPrefix: com.taipanbox.tokenfuse
  deploymentTarget:
    iOS: "17.2"
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.40.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # No signing — simulator builds only until an Apple Developer account exists.
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO
targets:
  TokenFuse:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Shared
    dependencies:
      - target: TokenFuseWidget
    info:
      path: Sources/Info.plist
      properties:
        # The name shown under the icon and in-app — matches the web dashboard.
        CFBundleDisplayName: TokenFuse
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Live Activities (Dynamic Island / Lock Screen), updated locally.
        NSSupportsLiveActivities: true
        # Allow cleartext HTTP to localhost / .local — dev planes run over HTTP;
        # production planes use HTTPS. Not arbitrary loads.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taipanbox.tokenfuse
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1,2"
  TokenFuseWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
      - path: Shared
      - path: Sources/DesignSystem.swift
      - path: Sources/Fuse.swift
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: TokenFuse
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taipanbox.tokenfuse.widget
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1,2"
  TokenFuseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: TokenFuse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taipanbox.tokenfuse.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  TokenFuse:
    build:
      targets:
        TokenFuse: all
    test:
      targets:
        - TokenFuseTests
