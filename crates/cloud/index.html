<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 -apple-system, Segoe UI, Roboto, sans-serif;
         background: #0d1117; color: #e6edf3; }
  header { padding: 16px 24px; border-bottom: 1px solid #21262d; display: flex;
           align-items: center; gap: 12px; flex-wrap: wrap; }
  h1 { font-size: 18px; margin: 0; }
  .muted { color: #8b949e; }
  main { padding: 24px; max-width: 1100px; margin: 0 auto; }
  .cards { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
  .card { background: #161b22; border: 1px solid #21262d; border-radius: 10px;
          padding: 16px 20px; min-width: 150px; }
  .card .n { font-size: 26px; font-weight: 700; }
  .card .l { color: #8b949e; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  input { background: #0d1117; border: 1px solid #30363d; color: #e6edf3;
          border-radius: 6px; padding: 6px 10px; font: inherit; }
  button { background: #238636; border: 0; color: #fff; border-radius: 6px;
           padding: 6px 12px; font: inherit; cursor: pointer; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #21262d; }
  th { color: #8b949e; font-weight: 600; font-size: 12px; text-transform: uppercase; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .pill { background: #21262d; border-radius: 20px; padding: 2px 8px; font-size: 12px; }
  .empty { color: #8b949e; padding: 40px; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>🧯 TokenFuse Cloud</h1>
  <span class="muted">single pane of glass across your gateways</span>
  <span style="flex:1"></span>
  <input id="key" placeholder="org API key (e.g. devkey)" size="24">
  <button id="save">Connect</button>
  <span id="status" class="muted"></span>
</header>
<main>
  <div class="cards">
    <div class="card"><div id="c-runs" class="n">–</div><div class="l">Runs</div></div>
    <div class="card"><div id="c-calls" class="n">–</div><div class="l">Calls</div></div>
    <div class="card"><div id="c-spent" class="n">–</div><div class="l">Spent</div></div>
    <div class="card"><div id="c-alerts" class="n">–</div><div class="l">Budget alerts</div></div>
    <div class="card">
      <div id="c-saved" class="n">–</div>
      <div class="l">Saved this month</div>
      <div id="c-saved-sub" class="muted" style="font-size:11px;margin-top:6px">–</div>
    </div>
  </div>
  <table>
    <thead><tr>
      <th>Run</th><th>Model</th><th class="num">Spent</th><th class="num">Calls</th>
      <th class="num">Cache hits</th><th class="num">Steps</th><th>Last seen</th><th></th>
    </tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <div id="empty" class="empty">Enter your org API key to view runs.</div>
</main>
<script>
  const $ = (id) => document.getElementById(id);
  let key = localStorage.getItem("tf_key") || "";
  $("key").value = key;

  const usd = (micro) => "$" + (micro / 1e6).toFixed(4);
  // User-facing marketing number: 2 decimals (not the CLI's 6).
  const usd2 = (micro) => "$" + (micro / 1e6).toFixed(2);
  const ago = (ms) => {
    if (!ms) return "–";
    const s = Math.max(0, (Date.now() - ms) / 1000);
    if (s < 60) return Math.round(s) + "s ago";
    if (s < 3600) return Math.round(s / 60) + "m ago";
    return Math.round(s / 3600) + "h ago";
  };

  async function api(path) {
    const r = await fetch(path, { headers: { Authorization: "Bearer " + key } });
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  }

  async function refresh() {
    if (!key) return;
    try {
      const [runs, sum, alerts, sav] = await Promise.all([
        api("/v1/runs"), api("/v1/summary"), api("/v1/alerts"), api("/v1/savings"),
      ]);
      $("status").textContent = "connected";
      $("c-runs").textContent = sum.runs;
      $("c-calls").textContent = sum.calls;
      $("c-spent").textContent = usd(sum.spent_microusd);
      const alerted = new Set((alerts || []).map((a) => a.run_id));
      $("c-alerts").textContent = alerted.size;
      $("c-alerts").style.color = alerted.size ? "#f85149" : "";
      $("c-saved").textContent = usd2(sav.total_saved_microusd);
      $("c-saved").style.color = sav.total_saved_microusd ? "#3fb950" : "";
      $("c-saved-sub").textContent =
        "blocked " + usd2(sav.blocked_spend_microusd) + " · cache " + usd2(sav.cache_saved_microusd) +
        " · router " + usd2(sav.router_saved_microusd);
      runs.sort((a, b) => b.spent_microusd - a.spent_microusd);
      $("empty").style.display = runs.length ? "none" : "block";
      $("empty").textContent = "No runs yet — send some traffic through a gateway.";
      $("rows").innerHTML = runs.map((r) => `
        <tr${r.killed ? ' style="opacity:.55"' : ""}>
          <td>${r.run_id}${alerted.has(r.run_id) ? ' <span class="pill" style="color:#f85149" title="near budget">⚠</span>' : ""}</td>
          <td><span class="pill">${r.model || "—"}</span></td>
          <td class="num">${usd(r.spent_microusd)}</td>
          <td class="num">${r.calls}</td>
          <td class="num">${r.cache_hits}</td>
          <td class="num">${r.steps}</td>
          <td>${ago(r.last_seen_millis)}</td>
          <td style="white-space:nowrap">
            <button data-budget="${r.run_id}" style="background:#30363d;padding:3px 10px;font-size:12px;margin-right:4px">Budget</button>
            ${r.killed
              ? '<span class="pill" style="color:#f85149">killed</span>'
              : `<button data-run="${r.run_id}" style="background:#b62324;padding:3px 10px;font-size:12px;">Kill</button>`}
          </td>
        </tr>`).join("");
      document.querySelectorAll("button[data-run]").forEach((b) => {
        b.onclick = () => killRun(b.getAttribute("data-run"));
      });
      document.querySelectorAll("button[data-budget]").forEach((b) => {
        b.onclick = () => setBudget(b.getAttribute("data-budget"));
      });
    } catch (e) {
      $("status").textContent = "error: " + e.message;
    }
  }

  async function setBudget(run) {
    if (!key) return;
    const v = prompt("Set budget for run '" + run + "' (USD):");
    if (v === null) return;
    const usd = parseFloat(v);
    if (isNaN(usd)) { alert("not a number"); return; }
    try {
      await fetch("/v1/runs/" + encodeURIComponent(run) + "/budget", {
        method: "POST",
        headers: { Authorization: "Bearer " + key, "content-type": "application/json" },
        body: JSON.stringify({ budget_usd: usd }),
      });
      refresh();
    } catch (e) { $("status").textContent = "set budget failed: " + e.message; }
  }

  async function killRun(run) {
    if (!key || !confirm("Kill run '" + run + "'? Gateways will hard-stop it.")) return;
    try {
      await fetch("/v1/runs/" + encodeURIComponent(run) + "/kill", {
        method: "POST", headers: { Authorization: "Bearer " + key },
      });
      refresh();
    } catch (e) { $("status").textContent = "kill failed: " + e.message; }
  }

  $("save").onclick = () => {
    key = $("key").value.trim();
    localStorage.setItem("tf_key", key);
    refresh();
  };
  refresh();
  setInterval(refresh, 3000);
</script>
</body>
</html>
