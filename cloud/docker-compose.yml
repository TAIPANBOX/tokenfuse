# TokenFuse Cloud — the whole stack in one command:
#
#   cd cloud && docker compose up
#
# Then open the dashboard on http://localhost:3000 (control-plane URL
# http://localhost:8080, org key `devkey`) and send traffic through the gateway
# on :4100 — runs and spend show up live. Runs anywhere Docker runs.
services:
  control-plane:
    image: ghcr.io/taipanbox/tokenfuse-control-plane:latest
    # Or build locally instead of pulling: `docker compose build`
    # build: ./control-plane
    environment:
      PORT: "8080"
      TOKENFUSE_CLOUD_KEYS: "devkey:demo"
      TOKENFUSE_CLOUD_DATA: "/data/state.json"   # durable across restarts
    volumes:
      - cloud-data:/data
    ports:
      - "8080:8080"

  dashboard:
    image: ghcr.io/taipanbox/tokenfuse-dashboard:latest
    # Or build locally: `docker compose build`
    # build: ./dashboard
    ports:
      - "3000:80"
    depends_on:
      - control-plane

  gateway:
    image: ghcr.io/taipanbox/tokenfuse:latest
    environment:
      TOKENFUSE_ADDR: "0.0.0.0:4100"
      # Point at a real provider to use it for real; omit for the offline stub.
      # TOKENFUSE_UPSTREAM: "https://api.anthropic.com/v1/messages"
      TOKENFUSE_MODE: "enforce"
      TOKENFUSE_CLOUD_URL: "http://control-plane:8080"
      TOKENFUSE_CLOUD_KEY: "devkey"
    ports:
      - "4100:4100"
    depends_on:
      - control-plane

volumes:
  cloud-data:
